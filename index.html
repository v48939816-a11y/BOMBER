<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BOMBO4KA</title>
<!-- Подключение Telegram и внешнего файла с языками -->
<script src="https://telegram.org"></script>
<script src="lang.js"></script>

<style>
:root {
    --bg-color: #e0e0e0;
    --brick-color: #f0f0f0;
    --brick-lines: #d0d0d0;
    --text: #1a1a1a;
    --border: #333333;
    --btn: #cccccc; 
    --btn-text: #000000;
    --btn-hover: #aaaaaa;
    
    /* Цвета для кнопки СТОП */
    --btn-stop: #000000;
    --btn-stop-text: #ffffff;
    --btn-stop-hover: #1a1a1a;
}

.dark-theme {
    --bg-color: #3d1a1a;
    --brick-color: #5c2626;
    --brick-lines: #2b1212;
    --text: #ccff00;
    --border: #ccff00;
    --btn: rgba(204, 255, 0, 0.6); 
    --btn-text: #000000;
    --btn-hover: rgba(204, 255, 0, 0.9);
}

body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Courier New', monospace;
    background-color: var(--bg-color);
    background-image: 
        linear-gradient(335deg, var(--brick-lines) 23px, transparent 23px),
        linear-gradient(155deg, var(--brick-lines) 23px, transparent 23px),
        linear-gradient(335deg, var(--brick-lines) 23px, transparent 23px),
        linear-gradient(155deg, var(--brick-lines) 23px, transparent 23px);
    background-size: 58px 58px;
    background-position: 0px 2px, 4px 35px, 29px 31px, 34px 6px;
    overflow: hidden;
    transition: all 0.3s;
}

.graffiti {
    position: absolute;
    top: 10%;
    width: 100%;
    text-align: center;
    font-size: 50px;
    font-weight: 900;
    color: var(--text);
    text-transform: uppercase;
    font-family: 'Arial Black', sans-serif;
    transform: rotate(-5deg);
    opacity: 0.8;
    text-shadow: 5px 5px 0px #000, -2px -2px 0px #000, 0 0 20px var(--text);
    z-index: 1;
}

.top-icon { position: absolute; top: 20px; right: 20px; cursor: pointer; z-index: 10; width: 32px; height: 32px; fill: var(--text); }

.settings-trigger { 
    position: absolute; 
    bottom: 30px; 
    right: 30px; 
    cursor: pointer; 
    z-index: 100; 
    width: 55px; 
    height: 55px; 
    fill: #000;
    background: rgba(255,255,255,0.2); 
    border-radius: 50%;
    padding: 5px;
}

.container {
    position: relative;
    text-align: center;
    z-index: 2;
    background: rgba(0,0,0,0.4);
    padding: 30px;
    border-radius: 30px;
    backdrop-filter: blur(5px);
    width: 320px;
    display: none;
}

#main-screen { display: block; }

.settings-grid { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
.settings-col { width: 48%; }

.mini-title {
    font-family: 'Arial Black', sans-serif;
    font-size: 14px;
    color: var(--text);
    margin-bottom: 10px;
    text-transform: uppercase;
}

.phone, .proxy-input {
    padding: 12px;
    font-size: 16px;
    border: 3px solid var(--border);
    border-radius: 14px;
    outline: none;
    width: 100%;
    box-sizing: border-box;
    margin-bottom: 10px;
    background: rgba(0,0,0,0.8);
    color: #ffffff !important;
    text-align: center;
}
.phone::placeholder, .proxy-input::placeholder { color: rgba(255, 255, 255, 0.5); }

button {
    padding: 18px;
    font-size: 22px;
    background: var(--btn);
    color: var(--btn-text);
    border: none;
    border-radius: 15px;
    cursor: pointer;
    font-weight: 900;
    width: 100%;
    box-shadow: 0 8px 15px rgba(0,0,0,0.4);
    transition: 0.2s;
}
button:active { transform: scale(0.95); }

/* СПЕЦИАЛЬНЫЙ СТИЛЬ ДЛЯ КНОПКИ СТОП */
#stop-btn {
    background: var(--btn-stop) !important;
    color: var(--btn-stop-text) !important;
}

.btn-small { padding: 10px; font-size: 14px; }

.lang-item {
    padding: 12px;
    background: rgba(0,0,0,0.6);
    margin: 8px 0;
    border-radius: 10px;
    color: #fff;
    cursor: pointer;
    text-align: left;
    font-size: 16px;
    display: flex;
    align-items: center;
    border: 2px solid transparent;
}
.lang-item:active { background: rgba(255,255,255,0.1); }
.lang-item span { margin-right: 15px; font-size: 22px; pointer-events: none; }

</style>
</head>

<body class="light-theme">

<div id="screen-title" class="graffiti">BOMBO4KA</div>

<div class="top-icon" onclick="toggleTheme()">
    <svg viewBox="0 0 24 24" id="theme-icon"><path id="path-tag" d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1z"/></svg>
</div>

<div class="settings-trigger" id="gear" onclick="openSettings()">
    <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.21.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
</div>

<div class="container" id="main-screen">
    <input type="tel" placeholder="ENTER PHONE" id="phone" class="phone">
    <button id="start-btn" onclick="bomb()">BOMB IT!</button>
    <button id="stop-btn" style="display:none;" onclick="stopBomb()">STOP IT!</button>
</div>

<div class="container" id="settings-screen">
    <div class="settings-grid">
        <div class="settings-col">
            <div class="mini-title">LANGUAGE</div>
            <button class="btn-small" id="select-lang-btn" onclick="openLanguages()">SELECT LANG</button>
        </div>
        <div class="settings-col">
            <div class="mini-title">PROXY</div>
            <input type="text" placeholder="IP:PORT" class="proxy-input" id="proxy-addr">
            <input type="text" placeholder="USER:PASS" class="proxy-input" id="proxy-auth">
        </div>
    </div>
    <button id="save-btn" onclick="saveSettings()">SAVE IT!</button>
</div>

<div class="container" id="lang-screen">
    <div class="mini-title" style="font-size:20px">SELECT LANGUAGE</div>
    <div class="lang-item" onclick="selectLang('en')"><span>🇺🇸</span> English</div>
    <div class="lang-item" onclick="selectLang('ru')"><span>🇷🇺</span> Русский</div>
    <div class="lang-item" onclick="selectLang('ua')"><span>🇺🇦</span> Українська</div>
    <button class="btn-small" id="back-btn" onclick="openSettings()" style="margin-top:20px;">BACK</button>
</div>

<script>
let tg = window.Telegram.WebApp;
tg.expand();

function selectLang(langCode) {
    const d = i18n[langCode]; // Данные подтянутся из lang.js
    
    document.getElementById('start-btn').innerText = d.bomb;
    document.getElementById('stop-btn').innerText = d.stop;
    document.getElementById('select-lang-btn').innerText = d.sel_lang;
    document.getElementById('save-btn').innerText = d.save;
    document.getElementById('back-btn').innerText = d.back;
    
    document.getElementById('phone').placeholder = d.ph_phone;
    document.getElementById('proxy-addr').placeholder = d.ph_proxy;
    document.getElementById('proxy-auth').placeholder = d.ph_auth;

    openSettings();
}

function showScreen(screenId, titleText) {
    document.getElementById('main-screen').style.display = 'none';
    document.getElementById('settings-screen').style.display = 'none';
    document.getElementById('lang-screen').style.display = 'none';
    document.getElementById(screenId).style.display = 'block';
    document.getElementById('screen-title').innerText = titleText;
    document.getElementById('gear').style.display = (screenId === 'main-screen') ? 'block' : 'none';
}

function openSettings() { showScreen('settings-screen', 'SETTINGS'); }
function openLanguages() { showScreen('lang-screen', 'LANGUAGE'); }
function saveSettings() { showScreen('main-screen', 'BOMBO4KA'); }

function toggleTheme() {
    const body = document.body;
    const iconPath = document.querySelector("#path-tag");
    body.classList.toggle("dark-theme");
    if (body.classList.contains("dark-theme")) {
        iconPath.setAttribute("d", "M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-3.03 0-5.5-2.47-5.5-5.5 0-1.82.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z");
    } else {
        iconPath.setAttribute("d", "M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1z");
    }
}

function bomb(){
    let phone = document.getElementById("phone").value;
    if(!phone) { tg.showAlert("ENTER PHONE!"); return; }
    
    document.getElementById("start-btn").style.display = "none";
    
    let stopBtn = document.getElementById("stop-btn");
    stopBtn.style.display = "inline-block";
    
    tg.sendData("START:" + phone);
}

function stopBomb() {
    document.getElementById("start-btn").style.display = "inline-block";
    document.getElementById("stop-btn").style.display = "none";
    tg.sendData("STOP");
}
</script>
</body>
</html>
