<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BOMBO4KA</title>
<script src="https://telegram.org"></script>

<style>
:root {
    --bg-color: #3d1a1a;
    --brick-color: #5c2626;
    --brick-lines: #2b1212;
    --text: #ccff00;
    --border: #ccff00;
    --btn: rgba(204, 255, 0, 0.6); 
    --btn-text: #000000;
    --btn-hover: rgba(204, 255, 0, 0.9);
    --btn-stop: rgba(255, 0, 0, 0.6); /* Красный для кнопки стоп */
    --btn-stop-hover: rgba(255, 0, 0, 0.9);
}

.light-theme {
    --bg-color: #e0e0e0;
    --brick-color: #f0f0f0;
    --brick-lines: #d0d0d0;
    --text: #1a1a1a;
    --border: #333333;
    --btn: #cccccc; 
    --btn-text: #000000;
    --btn-hover: #aaaaaa;
    --btn-stop: #ff6666;
    --btn-stop-hover: #ff4444;
}

body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Courier New', monospace;
    background-color: var(--bg-color);
    background-image: 
        linear-gradient(335deg, var(--brick-lines) 23px, transparent 23px),
        linear-gradient(155deg, var(--brick-lines) 23px, transparent 23px),
        linear-gradient(335deg, var(--brick-lines) 23px, transparent 23px),
        linear-gradient(155deg, var(--brick-lines) 23px, transparent 23px);
    background-size: 58px 58px;
    background-position: 0px 2px, 4px 35px, 29px 31px, 34px 6px;
    overflow: hidden;
    transition: all 0.3s;
}

.graffiti {
    position: absolute;
    top: 15%;
    width: 100%;
    text-align: center;
    font-size: 60px;
    font-weight: 900;
    color: var(--text);
    text-transform: uppercase;
    font-family: 'Arial Black', sans-serif;
    transform: rotate(-5deg);
    opacity: 0.8;
    text-shadow: 5px 5px 0px #000, -2px -2px 0px #000, 0 0 20px var(--text);
    user-select: none;
    pointer-events: none;
    z-index: 1;
}

.settings-icon {
    position: absolute;
    top: 20px;
    right: 20px;
    cursor: pointer;
    z-index: 10;
    width: 32px;
    height: 32px;
    fill: var(--text);
    filter: drop-shadow(2px 2px 2px black);
}

.container {
    position: relative;
    text-align: center;
    z-index: 2;
    background: rgba(0,0,0,0.4);
    padding: 40px;
    border-radius: 30px;
    backdrop-filter: blur(5px);
}

.phone {
    padding: 16px;
    font-size: 20px;
    border: 4px solid var(--border);
    border-radius: 14px;
    outline: none;
    width: 260px;
    margin-bottom: 35px;
    background: rgba(0,0,0,0.7);
    color: var(--text);
    text-align: center;
    font-weight: bold;
}

button {
    padding: 20px 80px;
    font-size: 26px;
    background: var(--btn);
    color: var(--btn-text);
    border: none;
    border-radius: 15px;
    cursor: pointer;
    font-weight: 900;
    transition: 0.3s;
    backdrop-filter: blur(8px);
    box-shadow: 0 10px 20px rgba(0,0,0,0.5);
    display: inline-block;
}

button:hover {
    background: var(--btn-hover);
    transform: scale(1.1) rotate(2deg);
}

/* Стили для кнопки STOP */
#stop-btn {
    background: var(--btn-stop);
    display: none; /* Скрыта по умолчанию */
}

#stop-btn:hover {
    background: var(--btn-stop-hover);
}
</style>
</head>

<body>

<div class="graffiti">BOMBO4KA</div>

<div class="settings-icon" onclick="toggleTheme()">
    <svg viewBox="0 0 24 24" id="theme-icon">
        <path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-3.03 0-5.5-2.47-5.5-5.5 0-1.82.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z""")/>>
    </svg>
</div>

<div class="container">
    <input type="tel" placeholder="ENTER PHONE" id="phone" class="phone">
    <br>
    <!-- Основная кнопка -->
    <button id="start-btn" onclick="bomb()">BOMB IT!</button>
    <!-- Кнопка STOP (скрыта) -->
    <button id="stop-btn" onclick="stopBomb()">STOP IT!</button>
</div>

<script>
let tg = window.Telegram.WebApp;
tg.expand();

function toggleTheme() {
    const body = document.body;
    const iconPath = document.querySelector("#theme-icon path");
    body.classList.toggle("light-theme");
    
    if (body.classList.contains("light-theme")) {
        iconPath.setAttribute("d", "M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1z");
    } else {
        iconPath.setAttribute("d", "M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-3.03 0-5.5-2.47-5.5-5.5 0-1.82.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z");
    }
}

function bomb(){
    let phone = document.getElementById("phone").value;
    if(phone === ""){
        tg.showAlert("SYSTEM: NO TARGET!");
        return;
    }
    
    // ПЕРЕКЛЮЧЕНИЕ КНОПОК
    document.getElementById("start-btn").style.display = "none";
    document.getElementById("stop-btn").style.display = "inline-block";
    
    tg.sendData("START:" + phone);
}

function stopBomb() {
    // ВОЗВРАТ КНОПОК
    document.getElementById("start-btn").style.display = "inline-block";
    document.getElementById("stop-btn").style.display = "none";
    
    tg.sendData("STOP");
}
</script>
</body>
</html>
