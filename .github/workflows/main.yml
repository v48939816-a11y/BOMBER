name: Build BOMBO4KA APK (Secure Mode)
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false # Защита от кражи токена GITHUB_TOKEN

      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}

      - name: Install System Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y --no-install-recommends \
          git zip unzip autoconf libtool pkg-config zlib1g-dev \
          libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev \
          libbz2-dev libsqlite3-dev openjdk-17-jdk python3-pip
          
          # Установка только проверенных версий инструментов сборки
          pip3 install --user --upgrade "buildozer==1.5.0" "cython<3.0" "setuptools<69" "wheel"

      - name: Configure Buildozer (Hardened)
        run: |
          [ -f buildozer.spec ] || /home/runner/.local/bin/buildozer init
          
          # Ограничиваем разрешения только необходимыми
          sed -i 's/# android.permissions = INTERNET/android.permissions = INTERNET/' buildozer.spec
          
          # Защита: отключаем автоматическое добавление всех разрешений
          sed -i 's/package.name = myapp/package.name = bombo4ka/' buildozer.spec
          sed -i 's/source.main = main.py/source.main = bomber.py/' buildozer.spec
          
          # Используем только TLS-совместимые библиотеки
          sed -i 's/requirements = python3,kivy/requirements = python3,kivy==2.3.0,requests,certifi,urllib3,android/' buildozer.spec
          
          # Принудительно ставим API 33 для соответствия современным стандартам безопасности Android
          sed -i 's/android.api = 31/android.api = 33/' buildozer.spec
          sed -i 's/# android.accept_sdk_license = False/android.accept_sdk_license = True/' buildozer.spec
          
          # Безопасная архитектура
          sed -i 's/android.archs = arm64-v8a, armeabi-v7a/android.archs = arm64-v8a/' buildozer.spec

      - name: Build APK
        run: |
          /home/runner/.local/bin/buildozer -v android debug
        env:
          CI: true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BOMBO4KA-Secure-APK
          path: bin/*.apk
          retention-days: 5 # Удаляем артефакт через 5 дней для приватности
